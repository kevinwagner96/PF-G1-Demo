services:
  db:
    image: postgres:16-alpine
    container_name: pf_g1_demo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pf_g1_django
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pf_g1_django"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build:
      context: https://github.com/kevinwagner96/PF-G1-Back-Django.git#main
    container_name: pf_g1_demo_back
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: demo-secret-key-change-me
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,back
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pf_g1_django
      SCHEDULER_BASE_URL: http://scheduler:3020
      SCHEDULER_CALLBACK_TOKEN: dev-scheduler-token
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
    ports:
      - "3010:3010"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: https://github.com/LucasCttr/pf-or-scheduler.git#scheduler-api
    container_name: pf_g1_demo_scheduler
    restart: unless-stopped
    environment:
      BACK_CALLBACK_URL: http://back:3010/api/v1/scheduler/callback/
      SCHEDULER_CALLBACK_TOKEN: dev-scheduler-token
    ports:
      - "3020:3020"
    depends_on:
      - back

  front:
    build:
      context: https://github.com/kevinwagner96/PF-G1-Front.git#main
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3010/api/v1
    container_name: pf_g1_demo_front
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3010/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - back

volumes:
  postgres_data:
